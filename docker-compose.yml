services:
  # 1. 主程式 (FastAPI)
  api:
    build: .
    container_name: EMI_backend_api
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db
      - qdrant
      - redis
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg2://demo_user:demo_password@db:5432/ta_rag
      - QDRANT_URL=http://qdrant:6333
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PYTHONUNBUFFERED=1
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./:/app

  # 2. 資料庫 (Postgres + pgvector)
  db:
    image: ankane/pgvector:latest
    container_name: rag_postgres_db
    restart: always
    environment:
      POSTGRES_USER: demo_user
      POSTGRES_PASSWORD: demo_password
      POSTGRES_DB: ta_rag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 3. 向量資料庫 (Qdrant)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag_qdrant_db
    restart: always
    ports:
      - "6335:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # 4. Redis 服務
  redis:
    image: redis:7-alpine
    container_name: rag_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  # 5. 前端 (React)
  frontend:
    build:
      context: ./frontend
    container_name: EMI_frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
